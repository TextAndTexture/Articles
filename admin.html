        <!-- دکمه‌های همگام‌سازی و ذخیره -->
        <div class="ctrl-group">
            <button class="btn-action btn-outline" style="border-color: #8b5cf6; color: #8b5cf6; background: rgba(139, 92, 246, 0.1);" onclick="updateGitHubTokenUI()">🔑 تغییر/تنظیم توکن گیت‌هاب</button>
            <button class="btn-action btn-outline" style="border-color: #3b82f6; color: #3b82f6; background: rgba(59, 130, 246, 0.1);" onclick="fetchLatestDataFromServer(false)">🔄 دریافت آخرین تغییرات سرور</button>
            <button id="btn-save-admin" class="btn-action btn-primary" style="background-color: #3b82f6;" onclick="saveAdminPanelToGitHub()">☁️ ذخیره پنل در سرور (آنلاین)</button>
            <button class="btn-action btn-outline" onclick="saveProjectJSON()">💾 خروجی بک‌آپ (JSON)</button>
            <button class="btn-action btn-outline" onclick="triggerFileInput('jsonLoadInput')">📂 بارگذاری بک‌آپ</button>
            <input type="file" id="jsonLoadInput" class="hidden-file" accept=".json" onchange="loadProjectJSON(event)">
        </div>

        <button id="btn-publish-index" class="btn-action btn-success" onclick="publishIndexHTML()">🚀 انتشار مستقیم ایندکس</button>
    </aside>

    <script>
        // ==========================================
        // تنظیمات API و گیت‌هاب
        // ==========================================
        const REPO_OWNER = 'textandtexture'; 
        const REPO_NAME = 'Articles'; 
        const BRANCH = 'main'; 
        
        let GITHUB_TOKEN = localStorage.getItem('my_gh_token');

        // چک در زمان لود صفحه (استفاده از رویداد onload برای اجرای بهتر)
        window.onload = () => {
            // جلوگیری از قفل ماندن دکمه‌های پنل اصلی در زمان لود مجدد
            const btnSave = document.getElementById('btn-save-admin');
            if (btnSave) { btnSave.innerText = '☁️ ذخیره پنل در سرور (آنلاین)'; btnSave.disabled = false; }
            
            const btnPub = document.getElementById('btn-publish-index');
            if (btnPub) { btnPub.innerText = '🚀 انتشار مستقیم ایندکس'; btnPub.disabled = false; }

            if (!GITHUB_TOKEN) {
                GITHUB_TOKEN = prompt('لطفاً توکن گیت‌هاب (Personal Access Token) خود را وارد کنید:\n(این توکن به صورت امن فقط در مرورگر سیستم شما ذخیره می‌شود)');
                if (GITHUB_TOKEN) {
                    localStorage.setItem('my_gh_token', GITHUB_TOKEN.trim());
                } else {
                    alert('هشدار: بدون توکن گیت‌هاب ارتباط با سرور قطع خواهد بود!');
                }
            }

            initData();
            if (GITHUB_TOKEN) {
                fetchLatestDataFromServer(true);
            }
        };

        // تابع آپدیت دستی توکن
        function updateGitHubTokenUI() {
            const currentToken = localStorage.getItem('my_gh_token') || '';
            const newToken = prompt('لطفاً توکن گیت‌هاب جدید خود را وارد کنید:\n(برای حذف توکن فعلی، کادر را خالی بگذارید)', currentToken);
            
            if (newToken !== null) { 
                if (newToken.trim() === '') {
                    localStorage.removeItem('my_gh_token');
                    GITHUB_TOKEN = null;
                    alert('توکن از حافظه پاک شد.');
                } else {
                    localStorage.setItem('my_gh_token', newToken.trim());
                    GITHUB_TOKEN = newToken.trim();
                    alert('توکن با موفقیت به‌روزرسانی شد!');
                }
            }
        }
        // ==========================================

        let projectData = {};

        // --- جلوگیری از کپی شدن استایل‌های مخرب ---
        document.addEventListener('paste', function(e) {
            if (e.target.getAttribute('contenteditable') === 'true' || e.target.isContentEditable) {
                e.preventDefault(); 
                const text = (e.originalEvent || e).clipboardData.getData('text/plain');
                document.execCommand('insertText', false, text);
            }
        });

        // --- مبدل اعداد انگلیسی به فارسی ---
        const faDigits = ['۰', '۱', '۲', '۳', '۴', '۵', '۶', '۷', '۸', '۹'];
        function toFaDigit(str) {
            if (!str) return str;
            return String(str).replace(/[0-9]/g, w => faDigits[w]);
        }

        function cleanDataWithFarsiDigits(data) {
            if (data.settings) {
                ['siteName', 'headerTitle', 'headerDesc'].forEach(k => {
                    if (data.settings[k]) data.settings[k] = toFaDigit(data.settings[k]);
                });
            }
            if (data.articles) {
                data.articles.forEach(art => {
                    if(art.title) art.title = toFaDigit(art.title);
                    if(art.desc) art.desc = toFaDigit(art.desc);
                    if(art.author) art.author = toFaDigit(art.author);
                    if(art.date) art.date = toFaDigit(art.date);
                });
            }
        }

        function initData() {
            const dataScript = document.getElementById('app-data');
            try { 
                projectData = JSON.parse(dataScript.textContent); 
                cleanDataWithFarsiDigits(projectData);
            } 
            catch (e) { console.error("خطا در خواندن داده‌های اولیه", e); }
            syncUIToData();
        }

        function updateState(key, value, element = null) {
            const faValue = toFaDigit(value); 
            projectData.settings[key] = faValue;
            if(key === 'siteName') document.title = faValue;

            if (element) {
                if (element.tagName === 'INPUT' || element.tagName === 'TEXTAREA') {
                    if (element.value !== faValue) {
                        const start = element.selectionStart;
                        const end = element.selectionEnd;
                        element.value = faValue;
                        element.setSelectionRange(start, end);
                    }
                } else {
                    if (element.innerText !== faValue) element.innerText = faValue;
                }
            }

            if(key === 'siteName' && element && element.id !== 'ctrl-siteName') {
                const ctrl = document.getElementById('ctrl-siteName');
                if (ctrl) ctrl.value = faValue;
            }
        }

        function updateThemeColor(colorHex) {
            projectData.settings.themeColor = colorHex;
            document.documentElement.style.setProperty('--primary', colorHex);
        }

        // --- مدیریت مقالات و جابه‌جایی ---
        function renderGrid() {
            const grid = document.getElementById('articles-grid');
            grid.innerHTML = '';

            projectData.articles.forEach((art, index) => {
                const bgStyle = art.image ? `background-image: url('${art.image}');` : '';
                const isFirst = index === 0;
                const isLast = index === projectData.articles.length - 1;
                const author = art.author || "نویسنده ناشناس";
                const date = art.date || toFaDigit(new Date().toLocaleDateString('fa-IR'));

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-img" style="${bgStyle}">
                        <div class="card-img-actions">
                            <button class="card-img-btn" onclick="triggerArticleImageUpload('${art.id}')">آپلود</button>
                            <button class="card-img-btn" onclick="setArticleImageURL('${art.id}')">لینک</button>
                        </div>
                        <div class="card-meta">
                            <div class="meta-author" contenteditable="true" data-placeholder="نویسنده" onblur="updateArticleData('${art.id}', 'author', this.innerText, this)">${author}</div>
                            <div class="meta-date" contenteditable="true" data-placeholder="تاریخ" onblur="updateArticleData('${art.id}', 'date', this.innerText, this)">${date}</div>
                        </div>
                    </div>
                    <div class="card-content">
                        <div class="card-title" contenteditable="true" data-placeholder="عنوان مقاله..." onblur="updateArticleData('${art.id}', 'title', this.innerText, this)">${art.title}</div>
                        <div class="card-desc" contenteditable="true" data-placeholder="مختصری از متن مقاله را بنویسید..." onblur="updateArticleData('${art.id}', 'desc', this.innerText, this)">${art.desc}</div>
                    </div>
                    <div class="card-actions">
                        <button class="btn-card btn-link" style="background:#e0f2fe; color:#0369a1;" onclick="openArticleEditor('${art.id}')">✍️ ویرایش / نوشتن مقاله</button>
                        <button class="btn-card btn-icon" onclick="moveArticle(${index}, -1)" ${isFirst ? 'disabled' : ''} title="انتقال به قبل">⬆</button>
                        <button class="btn-card btn-icon" onclick="moveArticle(${index}, 1)" ${isLast ? 'disabled' : ''} title="انتقال به بعد">⬇</button>
                        <button class="btn-card btn-icon btn-del" onclick="deleteArticle('${art.id}')" title="حذف">🗑</button>
                    </div>
                `;
                grid.appendChild(card);
            });

            const addCard = document.createElement('div');
            addCard.className = 'card add-card';
            addCard.onclick = addNewDraftArticle;
            addCard.innerHTML = `
                <div class="add-card-icon">+</div>
                <div class="add-card-text" id="add-card-txt">افزودن کارت جدید</div>
            `;
            grid.appendChild(addCard);
        }

        // ==========================================
        // ارتباط با API گیت‌هاب و همگام‌سازی (Sync)
        // ==========================================
        
        async function fetchLatestDataFromServer(isAuto = false) {
            if (!GITHUB_TOKEN) return;

            const overlay = document.getElementById('sync-overlay');
            const syncText = document.getElementById('sync-text');
            
            overlay.style.display = 'flex';
            syncText.innerText = isAuto ? 'در حال همگام‌سازی خودکار با سرور...' : 'در حال دریافت اطلاعات جدید...';

            const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/admin.html?ref=${BRANCH}`;
            
            try {
                const response = await fetch(url + '&t=' + Date.now(), {
                    headers: { 'Authorization': `Bearer ${GITHUB_TOKEN}` }
                });

                if (response.ok) {
                    const data = await response.json();
                    const base64Clean = data.content.replace(/\n/g, '');
                    const htmlContent = decodeURIComponent(escape(atob(base64Clean)));

                    const parser = new DOMParser();
                    const doc = parser.parseFromString(htmlContent, 'text/html');
                    const dataScript = doc.getElementById('app-data');

                    if (dataScript) {
                        projectData = JSON.parse(dataScript.textContent);
                        cleanDataWithFarsiDigits(projectData);
                        syncUIToData();
                        if (!isAuto) alert('✅ مقالات و تنظیمات با موفقیت از سرور دریافت شد.');
                    }
                } else if (response.status !== 404) {
                    throw new Error('کد خطا: ' + response.status);
                }
            } catch (error) {
                console.error('Sync Error:', error);
                if (!isAuto) alert('❌ خطا در دریافت اطلاعات از سرور: ' + error.message);
            } finally {
                overlay.style.display = 'none';
            }
        }

        async function uploadToGitHub(content, fileName, message) {
            if (!GITHUB_TOKEN) {
                alert('ابتدا توکن گیت‌هاب را تنظیم کنید. لطفاً صفحه را ریفرش کنید.');
                return false;
            }
            const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${fileName}`;
            try {
                let sha = null;
                const getRes = await fetch(url, { headers: { 'Authorization': `Bearer ${GITHUB_TOKEN}` } });
                if (getRes.ok) {
                    const data = await getRes.json();
                    sha = data.sha;
                }
                const contentEncoded = btoa(unescape(encodeURIComponent(content)));
                const putRes = await fetch(url, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message, content: contentEncoded, branch: BRANCH, ...(sha && { sha }) })
                });
                if (!putRes.ok) throw new Error((await putRes.json()).message);
                return true;
            } catch (error) {
                console.error(error); throw error; 
            }
        }

        async function deleteFileFromGitHub(fileName) {
            if (!GITHUB_TOKEN) return;
            const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${fileName}`;
            try {
                const getRes = await fetch(url, { headers: { 'Authorization': `Bearer ${GITHUB_TOKEN}` } });
                if (!getRes.ok) return; 
                const sha = (await getRes.json()).sha;
                await fetch(url, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: `Delete article file: ${fileName}`, sha: sha, branch: BRANCH })
                });
            } catch (err) { console.error('خطا در حذف فایل:', err); }
        }

        // ==========================================
        // سیستم ویرایشگر داخلی (Iframe) با استخراج خام
        // ==========================================

        function addNewDraftArticle() {
            projectData.articles.unshift({
                id: 'art-' + Date.now(),
                title: 'عنوان مقاله جدید',
                desc: 'توضیحات کوتاه مقاله را اینجا بنویسید...',
                link: '#', 
                image: '',
                author: 'نام نویسنده',
                date: toFaDigit(new Date().toLocaleDateString('fa-IR'))
            });
            renderGrid();
        }

        function closeEditorModal() {
            document.getElementById('editor-modal').classList.remove('active');
        }

        // باز کردن ادیتور
        async function openArticleEditor(id) {
            const art = projectData.articles.find(a => a.id === id);
            if(!art) return;

            let htmlContent = '';
            const templateEl = document.getElementById('editor-template');
            const fallbackTemplate = templateEl.value ? templateEl.value.trim() : templateEl.textContent.trim();
            
            // نمایش صفحه لودینگ در پنل
            const overlay = document.getElementById('sync-overlay');
            const syncText = document.getElementById('sync-text');
            overlay.style.display = 'flex';
            syncText.innerText = 'در حال دریافت اطلاعات مقاله از سرور...';

            if (art.link && art.link.endsWith('.html') && !art.link.startsWith('http')) {
                try {
                    const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${art.link}?ref=${BRANCH}`;
                    const res = await fetch(url + '&t=' + Date.now(), { headers: { 'Authorization': `Bearer ${GITHUB_TOKEN}` } });
                    
                    if (res.ok) {
                        const data = await res.json();
                        const base64Clean = data.content.replace(/\n/g, '');
                        const publishedHTML = decodeURIComponent(escape(atob(base64Clean)));
                        
                        const parser = new DOMParser();
                        const docParsed = parser.parseFromString(publishedHTML, 'text/html');
                        const rawDataNode = docParsed.getElementById('raw-editor-html');
                        
                        if (rawDataNode) {
                            htmlContent = unescape(decodeURIComponent(rawDataNode.textContent));
                        } else {
                            alert('⚠️ توجه: این مقاله با نسخه قدیمی ایجاد شده و امکان ویرایش زنده ندارد.');
                            htmlContent = fallbackTemplate;
                        }
                    } else {
                        htmlContent = fallbackTemplate;
                    }
                } catch (e) {
                    console.error("Error loading article:", e);
                    htmlContent = fallbackTemplate;
                }
            } else {
                htmlContent = fallbackTemplate;
            }

            overlay.style.display = 'none';

            if (htmlContent === 'xxxxx' || !htmlContent || htmlContent.length < 50) {
                alert('خطا در بارگذاری ادیتور: کد مرجع یافت نشد!');
                return;
            }

            const injectedScript = `<script>window.PARENT_ARTICLE_ID = '${id}';<\/script>`;
            htmlContent = htmlContent.replace(/<head[^>]*>/i, '$&' + injectedScript);

            const modal = document.getElementById('editor-modal');
            
            // بازسازی کامل تگ Iframe برای جلوگیری از خطای Identifier already been declared
            const oldIframe = document.getElementById('editor-iframe');
            const newIframe = document.createElement('iframe');
            newIframe.id = 'editor-iframe';
            oldIframe.parentNode.replaceChild(newIframe, oldIframe);

            modal.classList.add('active');
            
            const doc = newIframe.contentWindow.document;
            doc.open();
            doc.write(htmlContent);
            doc.close();
        }

        // دریافت پیام از ادیتور
        window.addEventListener('message', async function(event) {
            if (event.data && event.data.action === 'PUBLISH_FROM_EDITOR') {
                const { articleId, htmlContent, title, desc, author, coverImage } = event.data;
                
                const art = projectData.articles.find(a => a.id === articleId);
                if (!art) return;

                if(title) updateArticleData(articleId, 'title', title);
                if(desc) updateArticleData(articleId, 'desc', desc);
                if(author) updateArticleData(articleId, 'author', author);
                if(coverImage) { art.image = coverImage; }
                
                renderGrid();

                const fileName = (art.link && art.link !== '#') ? art.link : `article_${Date.now()}.html`;
                
                try {
                    const successArt = await uploadToGitHub(htmlContent, fileName, `Publish article: ${fileName}`);
                    
                    if (successArt) {
                        art.link = fileName;
                        await publishIndexHTML(true);
                        await saveAdminPanelToGitHub(true);

                        alert('✅ مقاله منتشر شد، کارت‌ها به‌روزرسانی شدند و پنل در سرور ذخیره شد!');
                        closeEditorModal();
                    }
                } catch(error) {
                    alert('❌ خطا در عملیات انتشار: ' + error.message);
                }
            }
        });

        // ==========================================

        function updateArticleData(id, field, value, element = null) {
            const faValue = toFaDigit(value); 
            const art = projectData.articles.find(a => a.id === id);
            if(art) art[field] = faValue;
            if (element && element.innerText !== faValue) {
                element.innerText = faValue;
            }
        }

        async function deleteArticle(id) {
            if(confirm('این مقاله از لیست ایندکس حذف شود؟\n\nنکته مهم: اگر این مقاله فایل اختصاصی در سرور داشته باشد، فایل آن نیز برای همیشه حذف خواهد شد!')) {
                const art = projectData.articles.find(a => a.id === id);
                if (art && art.link && art.link.endsWith('.html') && !art.link.startsWith('http')) {
                    const btnOriginalText = document.activeElement.innerText;
                    document.activeElement.innerText = '⏳';
                    await deleteFileFromGitHub(art.link);
                    document.activeElement.innerText = btnOriginalText;
                }
                projectData.articles = projectData.articles.filter(a => a.id !== id);
                renderGrid();
            }
        }

        function moveArticle(index, direction) {
            const arr = projectData.articles;
            if (direction === -1 && index > 0) {
                [arr[index], arr[index - 1]] = [arr[index - 1], arr[index]];
            } 
            else if (direction === 1 && index < arr.length - 1) {
                [arr[index], arr[index + 1]] = [arr[index + 1], arr[index]];
            }
            renderGrid();
        }

        // --- فایل‌ها، تصاویر و لینک‌ها ---
        function triggerFileInput(inputId) { document.getElementById(inputId).click(); }

        let currentTargetArticleId = null; 
        function triggerArticleImageUpload(articleId) {
            currentTargetArticleId = articleId;
            let fileInput = document.getElementById('tempArtImageInput');
            if(!fileInput) {
                fileInput = document.createElement('input');
                fileInput.type = 'file'; fileInput.id = 'tempArtImageInput';
                fileInput.accept = 'image/*'; fileInput.className = 'hidden-file';
                fileInput.onchange = processArticleImage; document.body.appendChild(fileInput);
            }
            fileInput.click();
        }

        function processArticleImage(e) {
            const file = e.target.files[0];
            if(!file || !currentTargetArticleId) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const art = projectData.articles.find(a => a.id === currentTargetArticleId);
                if(art) { art.image = event.target.result; renderGrid(); }
                e.target.value = '';
            };
            reader.readAsDataURL(file);
        }

        function setArticleImageURL(articleId) {
            const art = projectData.articles.find(a => a.id === articleId);
            if(!art) return;
            const currentUrl = art.image.startsWith('data:') ? '' : art.image;
            const url = prompt('لینک تصویر را وارد کنید (http...):', currentUrl);
            if(url !== null) {
                art.image = url.trim();
                renderGrid();
            }
        }

        function updateHeaderBg(input) {
            const file = input.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                projectData.settings.bgImageBase64 = event.target.result;
                applyHeaderBackground();
            };
            reader.readAsDataURL(file);
        }

        function setHeaderBgURL() {
            const currentUrl = (projectData.settings.bgImageBase64 || '').startsWith('data:') ? '' : projectData.settings.bgImageBase64;
            const url = prompt('لینک تصویر پس‌زمینه هدر را وارد کنید:', currentUrl);
            if(url !== null) {
                projectData.settings.bgImageBase64 = url.trim();
                applyHeaderBackground();
            }
        }

        function applyHeaderBackground() {
            const header = document.getElementById('site-header');
            const bgLayer = document.getElementById('header-bg-layer');
            if(projectData.settings.bgImageBase64) {
                bgLayer.style.backgroundImage = `url('${projectData.settings.bgImageBase64}')`;
                bgLayer.classList.add('active');
                header.classList.add('has-image');
            } else {
                bgLayer.style.backgroundImage = 'none';
                bgLayer.classList.remove('active');
                header.classList.remove('has-image');
            }
        }

        function applyCustomFont() {
            const existingStyle = document.getElementById('dynamic-custom-font');
            if (existingStyle) existingStyle.remove();
            if (projectData.settings.customFontBase64) {
                const style = document.createElement('style');
                style.id = 'dynamic-custom-font';
                style.innerHTML = `@font-face { font-family: 'LiveCustomFont'; src: url('${projectData.settings.customFontBase64}'); } * { font-family: 'LiveCustomFont', 'Vazirmatn', sans-serif !important; }`;
                document.head.appendChild(style);
            }
        }

        function updateCustomFont(input) {
            const file = input.files[0];
            if(!file) return;
            const statusLabel = document.getElementById('font-status');
            statusLabel.innerText = 'در حال پردازش...';
            const reader = new FileReader();
            reader.onload = function(event) {
                projectData.settings.customFontBase64 = event.target.result;
                statusLabel.innerText = '✅ فونت اعمال شد';
                applyCustomFont();
            };
            reader.readAsDataURL(file);
        }

        function syncUIToData() {
            document.title = projectData.settings.siteName;
            document.getElementById('ctrl-siteName').value = projectData.settings.siteName;
            document.getElementById('live-title').innerText = projectData.settings.headerTitle;
            document.getElementById('live-desc').innerText = projectData.settings.headerDesc;
            document.getElementById('ctrl-color').value = projectData.settings.themeColor;
            
            updateThemeColor(projectData.settings.themeColor);
            applyHeaderBackground();
            
            if(projectData.settings.customFontBase64) {
                document.getElementById('font-status').innerText = '✅ فونت شخصی فعال است';
            }
            applyCustomFont();
            renderGrid();
        }

        function saveProjectJSON() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(projectData, null, 2));
            const dl = document.createElement('a');
            dl.setAttribute("href", dataStr);
            dl.setAttribute("download", "articles-project.json");
            document.body.appendChild(dl); dl.click(); dl.remove();
        }

        function loadProjectJSON(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const loadedData = JSON.parse(e.target.result);
                    if (loadedData.settings && loadedData.articles) {
                        projectData = loadedData; 
                        cleanDataWithFarsiDigits(projectData); 
                        syncUIToData();
                        alert('پروژه با موفقیت بارگذاری شد.');
                    }
                } catch (error) { alert('خطا در خواندن فایل JSON.'); }
            };
            reader.readAsText(file);
            event.target.value = ''; 
        }

        // --- آپلود کل پنل مدیریت به گیت‌هاب ---
        async function saveAdminPanelToGitHub(isSilent = false) {
            if (!GITHUB_TOKEN) return;

            const btn = document.getElementById('btn-save-admin');
            const originalText = btn.innerText;
            if (!isSilent) {
                btn.innerText = '⏳ در حال ذخیره...';
                btn.disabled = true;
            }

            const clonedDoc = document.cloneNode(true);
            const dataScript = clonedDoc.getElementById('app-data');
            if(dataScript) dataScript.textContent = JSON.stringify(projectData, null, 4);
            
            const grid = clonedDoc.getElementById('articles-grid');
            if(grid) grid.innerHTML = '';
            
            const dynStyle = clonedDoc.getElementById('dynamic-custom-font');
            if(dynStyle) dynStyle.remove();

            // ریست کردن وضعیت دکمه‌ها در کلون (جلوگیری از قفل شدن همیشگی)
            const cloneBtnSave = clonedDoc.getElementById('btn-save-admin');
            if (cloneBtnSave) { cloneBtnSave.innerText = '☁️ ذخیره پنل در سرور (آنلاین)'; cloneBtnSave.disabled = false; }
            
            const cloneBtnPub = clonedDoc.getElementById('btn-publish-index');
            if (cloneBtnPub) { cloneBtnPub.innerText = '🚀 انتشار مستقیم ایندکس'; cloneBtnPub.disabled = false; }

            const cloneModal = clonedDoc.getElementById('editor-modal');
            if (cloneModal) { cloneModal.classList.remove('active'); }
            
            const cloneOverlay = clonedDoc.getElementById('sync-overlay');
            if (cloneOverlay) { cloneOverlay.style.display = 'none'; }

            const htmlContent = "<!DOCTYPE html>\n" + clonedDoc.documentElement.outerHTML;
            
            try {
                const success = await uploadToGitHub(htmlContent, 'admin.html', 'Update Admin Panel state');
                if (!isSilent) {
                    btn.innerText = originalText;
                    btn.disabled = false;
                    if (success) alert('✅ پنل مدیریت با موفقیت در سرور ذخیره شد!');
                }
            } catch (e) {
                if (!isSilent) {
                    btn.innerText = originalText;
                    btn.disabled = false;
                    alert('خطا در ذخیره پنل: ' + e.message);
                }
            }
        }
